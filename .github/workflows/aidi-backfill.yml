name: backfill
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: Start
        required: true
        default: '2022-12-01'
      end_date:
        description: End
        required: true
        default: '2026-06-16'
      batch_size:
        description: Batch size
        required: true
        default: '10'

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      periods: ${{ steps.gen.outputs.periods }}
    steps:
      - uses: actions/checkout@v4
      - id: gen
        run: |
          python engine/gen_periods.py ${{ github.event.inputs.start_date }} ${{ github.event.inputs.end_date }} > periods.json
          echo "periods=$(cat periods.json)" >> $GITHUB_OUTPUT

  collect:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      max-parallel: 3
      matrix:
        period: ${{ fromJSON(needs.generate.outputs.periods) }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p "data/raw/${{ matrix.period.name }}"
          echo '{"start":"${{ matrix.period.start }}","end":"${{ matrix.period.end }}"}' > "data/raw/${{ matrix.period.name }}/_period.json"
      - run: |
          git config user.name "bot" && git config user.email "bot@bot"
          git add data/raw/
          git diff --staged --quiet || (git commit -m "data ${{ matrix.period.name }}" && git push)
