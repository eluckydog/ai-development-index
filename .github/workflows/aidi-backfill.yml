name: backfill
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: Start date
        required: true
        default: '2022-12-01'
      end_date:
        description: End date
        required: true
        default: '2026-06-16'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: python engine/gen_periods.py ${{ github.event.inputs.start_date }} ${{ github.event.inputs.end_date }} > periods.json
      - run: python3 -c "import json,os; ps=json.load(open('periods.json')); [os.makedirs(f'data/raw/{p[\"name\"]}',exist_ok=True) or open(f'data/raw/{p[\"name\"]}/_period.json','w').write('{\"start\":\"'+p['start']+'\",\"end\":\"'+p['end']+'\"}') for p in ps]; print(f'Created {len(ps)} periods')"
      - run: |
          git config user.name "bot"
          git config user.email "bot@bot"
          git add data/raw/
          git diff --staged --quiet || (git commit -m "backfill data" && git push)
