name: collect
"on":
  workflow_dispatch:
    inputs:
      start_date:
        description: Start
        required: true
        default: '2026-06-01'
      end_date:
        description: End
        required: true
        default: '2026-06-16'
      period_name:
        description: Period
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: mkdir -p data/raw/test && echo '{"ok":true}' > data/raw/test/_period.json
      - run: |
          git config user.name "bot"
          git config user.email "bot@bot"
          git add data/raw/
          git diff --staged --quiet || (git commit -m "test" && git push)
